<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finance Tracker Pro</title>
  <style>
    :root{
      --bg:#08101f;--bg2:#101a32;--panel:rgba(255,255,255,.08);--panel2:rgba(255,255,255,.05);
      --border:rgba(255,255,255,.12);--text:#f5f8ff;--muted:#9fb0d1;--accent:#73e4ff;--accent2:#7a63ff;--accent3:#ff5dd1;
      --green:#26d38f;--red:#ff6b86;--yellow:#ffbd59;--blue:#7db8ff;--shadow:0 18px 48px rgba(0,0,0,.25);
    }
    body.light{
      --bg:#eef4ff;--bg2:#f6f9ff;--panel:rgba(255,255,255,.72);--panel2:rgba(255,255,255,.52);
      --border:rgba(20,30,55,.10);--text:#111a2e;--muted:#5f6f8e;--accent:#1ac8ff;--accent2:#6952ff;--accent3:#ff57be;
      --green:#169c60;--red:#d93c63;--yellow:#b86a04;--blue:#2563eb;--shadow:0 14px 36px rgba(36,49,87,.12);
    }
    *{box-sizing:border-box} html,body{margin:0;min-height:100%;font-family:Inter,Arial,sans-serif;background:radial-gradient(circle at top left, rgba(115,228,255,.12), transparent 24%),radial-gradient(circle at top right, rgba(122,99,255,.12), transparent 18%),linear-gradient(160deg,var(--bg),var(--bg2));color:var(--text)}
    body{overflow-x:hidden}
    button,input,select,textarea{font:inherit}
    .app{display:grid;grid-template-columns:280px 1fr;min-height:100vh}
    .sidebar,.card,.chip,.item,.mobile-drawer{position:relative}
    .sidebar{padding:18px;border-right:1px solid rgba(255,255,255,.07);background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));backdrop-filter:blur(18px)}
    .brand,.card,.chip,.item,.mobile-drawer,.top-btn,.icon-btn,.status-btn,.menu-btn,.toggle-btn,input,select,textarea{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--border);box-shadow:var(--shadow);backdrop-filter:blur(18px)}
    .brand,.card,.chip,.item,.mobile-drawer{border-radius:24px}
    .brand{padding:20px;margin-bottom:18px;overflow:hidden}
    .badge{display:inline-flex;padding:8px 12px;border-radius:999px;font-size:12px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);margin-bottom:12px}
    .brand h1{margin:0 0 8px;font-size:28px;line-height:1}
    .brand p{margin:0;color:var(--muted);font-size:14px;line-height:1.6}
    .nav{display:grid;gap:10px}
    .nav button,.top-btn,.toggle-btn,.status-btn,.menu-btn{border-radius:16px;border:1px solid transparent;color:var(--text);cursor:pointer;transition:.18s ease}
    .nav button{padding:14px 16px;text-align:left;font-weight:800;background:transparent}
    .nav button:hover,.nav button.active,.top-btn:hover,.toggle-btn:hover,.status-btn:hover,.menu-btn:hover,.icon-btn:hover{transform:translateY(-2px);border-color:var(--border)}
    .actions{margin-top:16px;display:grid;gap:12px}
    .switch{display:flex;align-items:center;gap:10px}
    .switch span{font-size:13px;color:var(--muted);font-weight:700}
    .theme{position:relative;width:60px;height:34px;border-radius:999px;border:1px solid var(--border);cursor:pointer;background:linear-gradient(180deg,var(--panel),var(--panel2))}
    .theme::after{content:"";position:absolute;top:3px;left:3px;width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));transition:transform .18s ease}
    body.light .theme::after{transform:translateX(26px)}
    .main{padding:22px;min-width:0}
    .topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;flex-wrap:wrap;margin-bottom:14px}
    .topbar h2{margin:0;font-size:34px;line-height:1;letter-spacing:-.03em}
    .topbar p{margin:10px 0 0;color:var(--muted);line-height:1.55}
    .topbar-left{min-width:0;flex:1}
    .top-right{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .top-btn{padding:11px 14px;font-weight:800;border:1px solid var(--border);background:linear-gradient(180deg,var(--panel),var(--panel2))}
    .top-btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2) 58%, var(--accent3));color:white;border-color:transparent}
    .top-btn.danger{background:linear-gradient(180deg, rgba(255,107,134,.16), rgba(255,107,134,.08));color:#ffd7e0;border-color:rgba(255,107,134,.22)}
    .mobile-top{display:none;justify-content:space-between;align-items:center;margin-bottom:12px}
    .menu-btn{width:48px;height:48px;border:1px solid var(--border);display:inline-flex;align-items:center;justify-content:center;background:linear-gradient(180deg,var(--panel),var(--panel2))}
    .menu-btn span{display:block;width:18px;height:2px;background:var(--text);box-shadow:0 6px 0 var(--text),0 -6px 0 var(--text)}
    .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px;margin-bottom:12px}
    .card{padding:16px;overflow:hidden}
    .card.clickable{cursor:pointer}
    .label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:800;margin-bottom:8px}
    .value{font-size:26px;line-height:1;font-weight:900;margin-bottom:8px}
    .sub{font-size:12px;color:var(--muted);line-height:1.45}
    .grid{display:grid;grid-template-columns:1.15fr .85fr;gap:12px}
    .stack,.list,.menu-list,.bar-list,.reminders,.suggestions,.chips{display:grid;gap:12px}
    .section{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap;margin-bottom:12px}
    .section h3{margin:0;font-size:22px}
    .section p{margin:6px 0 0;color:var(--muted);font-size:13px;line-height:1.5}
    .hero{padding:18px;border-radius:28px;border:1px solid var(--border);box-shadow:var(--shadow);background:radial-gradient(circle at top left, rgba(115,228,255,.18), transparent 28%),radial-gradient(circle at top right, rgba(122,99,255,.18), transparent 22%),linear-gradient(180deg,var(--panel),var(--panel2))}
    .hero-grid{display:grid;grid-template-columns:1.15fr .85fr;gap:14px}
    .ring-box{min-height:260px;display:flex;align-items:center;justify-content:center}
    .ring-center{position:absolute;text-align:center}
    .ring-center strong{display:block;font-size:30px;line-height:1;font-weight:900}
    .ring-center span{display:block;margin-top:6px;font-size:12px;color:var(--muted)}
    .ring-progress{transition:stroke-dashoffset .6s ease}
    .mini-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}
    .chip{padding:14px;border-radius:18px}
    .chip .label{margin-bottom:6px}
    .chip .value{font-size:22px;margin:0 0 8px}
    .item{padding:14px;overflow:hidden}
    .item-head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;flex-wrap:wrap}
    .item-title{font-size:17px;font-weight:900}
    .meta{display:flex;gap:8px;flex-wrap:wrap;color:var(--muted);font-size:12px;line-height:1.45;margin-top:7px}
    .pill{display:inline-flex;align-items:center;padding:7px 11px;border-radius:999px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.08);font-size:12px;font-weight:800}
    .pill.green{color:var(--green);border-color:rgba(38,211,143,.24);background:rgba(38,211,143,.10)}
    .pill.red{color:var(--red);border-color:rgba(255,107,134,.24);background:rgba(255,107,134,.10)}
    .pill.yellow{color:var(--yellow);border-color:rgba(255,189,89,.24);background:rgba(255,189,89,.10)}
    .pill.blue{color:var(--blue);border-color:rgba(125,184,255,.24);background:rgba(125,184,255,.10)}
    .toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:10px}
    .icon-btn{width:40px;height:40px;border-radius:14px;border:1px solid var(--border);display:inline-flex;align-items:center;justify-content:center;background:linear-gradient(180deg,var(--panel),var(--panel2));color:var(--text);cursor:pointer}
    .toggle-btn,.status-btn{padding:10px 12px;font-weight:800;border:1px solid var(--border);background:linear-gradient(180deg,var(--panel),var(--panel2))}
    .status-btn.paid,.toggle-btn.paid{color:var(--green);border-color:rgba(38,211,143,.24);background:linear-gradient(180deg, rgba(38,211,143,.14), rgba(38,211,143,.08))}
    .status-btn.pending,.toggle-btn.pending{color:var(--blue);border-color:rgba(125,184,255,.24);background:linear-gradient(180deg, rgba(125,184,255,.14), rgba(125,184,255,.08))}
    .status-btn.delayed,.toggle-btn.delayed,.toggle-btn.unpaid{color:var(--yellow);border-color:rgba(255,189,89,.24);background:linear-gradient(180deg, rgba(255,189,89,.14), rgba(255,189,89,.08))}
    .form{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
    .field{display:flex;flex-direction:column;gap:6px;min-width:0}
    .field label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:800}
    input,select,textarea{width:100%;min-width:0;max-width:100%;min-height:48px;padding:12px 14px;border-radius:16px;border:1px solid var(--border);color:var(--text);outline:none;background:linear-gradient(180deg,var(--panel),var(--panel2))}
    textarea{min-height:84px;resize:vertical}
    input::placeholder,textarea::placeholder{color:var(--muted)}
    input:focus,select:focus,textarea:focus{border-color:rgba(115,228,255,.4);box-shadow:0 0 0 4px rgba(115,228,255,.10)}
    .empty{padding:20px;border-radius:18px;border:1px dashed rgba(255,255,255,.18);text-align:center;color:var(--muted);line-height:1.6;background:linear-gradient(180deg,var(--panel),var(--panel2))}
    .ledger-row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.08)}
    .ledger-row:last-child{border-bottom:none}
    .amount.income{color:var(--green);font-weight:900}.amount.expense{color:var(--red);font-weight:900}
    .bar-row{display:grid;grid-template-columns:88px 1fr auto;gap:10px;align-items:center}
    .bar-label{font-size:12px;font-weight:700;color:var(--muted)}
    .track{height:12px;border-radius:999px;overflow:hidden;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.08)}
    .fill{height:100%;border-radius:inherit;background:linear-gradient(90deg,var(--accent),var(--accent2),var(--accent3))}
    .bar-value{font-size:12px;font-weight:800}
    .client-card.open .client-body{display:block}.client-body{display:none;margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,.08)}
    .months{display:grid;grid-template-columns:repeat(auto-fit,minmax(118px,1fr));gap:10px}
    .month{padding:12px;border-radius:18px;background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--border);box-shadow:var(--shadow);display:flex;flex-direction:column;justify-content:space-between;gap:10px}
    .month h4{margin:0;font-size:14px;line-height:1.1}
    .month .small{font-size:12px;color:var(--muted);line-height:1.35}
    .month-actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
    .mobile-overlay{display:none;position:fixed;inset:0;background:rgba(5,10,18,.55);backdrop-filter:blur(8px);z-index:98}
    .mobile-drawer{display:none;position:fixed;top:0;left:0;width:min(86vw,340px);height:100vh;padding:18px;z-index:99;overflow-y:auto}
    body.menu-open .mobile-overlay{display:block} body.menu-open .mobile-drawer{display:block}
    .reminder{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;padding:14px;border-radius:18px;background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--border)}
    .reminder.overdue{border-color:rgba(255,107,134,.24);background:linear-gradient(180deg, rgba(255,107,134,.12), rgba(255,107,134,.05))}
    .reminder-badge{width:42px;height:42px;border-radius:14px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);font-size:18px;font-weight:900}
    .reminder-badge.upcoming{color:var(--blue)} .reminder-badge.overdue{color:var(--red)}
    .reminder-title{font-weight:900;font-size:15px}
    .reminder-sub{margin-top:4px;color:var(--muted);font-size:12px;line-height:1.45}
    .progress{width:100%;height:12px;border-radius:999px;overflow:hidden;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.08);margin-top:10px}
    .progress > span{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2),var(--accent3))}
    .hidden{display:none !important}
    @media (max-width:1080px){.grid,.hero-grid{grid-template-columns:1fr}.mini-grid{grid-template-columns:1fr 1fr 1fr}}
    @media (max-width:900px){.app{grid-template-columns:1fr}.sidebar{display:none}.main{padding:12px}.mobile-top{display:flex}.top-right{display:none}.topbar h2{font-size:24px}.topbar p{font-size:13px}.stats{grid-template-columns:repeat(2,minmax(0,1fr));gap:9px}.card{padding:14px}.section h3{font-size:18px}}
    @media (max-width:760px){.form,.mini-grid{grid-template-columns:1fr}.grid,.stack,.list,.menu-list,.bar-list,.reminders,.suggestions,.chips{gap:10px}.ledger-row{grid-template-columns:1fr}.months{grid-template-columns:1fr}.month-actions{grid-template-columns:1fr 1fr 1fr}.toolbar{flex-direction:column;align-items:stretch}.toolbar > *{width:100%}.reminder{grid-template-columns:auto 1fr}}
    @media (max-width:520px){.stats{grid-template-columns:1fr 1fr}.topbar h2{font-size:22px}input,select,textarea{font-size:16px}}
  </style>
</head>
<body>
  <div class="mobile-overlay" id="mobileOverlay" onclick="closeMobileMenu()"></div>
  <aside class="mobile-drawer" id="mobileDrawer">
    <div class="brand">
      <div class="badge">Private tracker</div>
      <h1>Finance Tracker</h1>
      <p>Your private finance software.</p>
    </div>
    <div class="nav" id="mobileNav"></div>
    <div class="actions">
      <div class="switch"><span>Theme</span><button class="theme" id="themeMobile" type="button"></button></div>
      <button class="top-btn danger" id="resetMobile" type="button">Reset all data</button>
    </div>
  </aside>

  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="badge">Private tracker</div>
        <h1>Finance Tracker</h1>
        <p>Your private finance software with a real wellness ring and a customizable main menu.</p>
      </div>
      <div class="nav" id="desktopNav"></div>
      <div class="actions">
        <div class="switch"><span>Theme</span><button class="theme" id="themeSide" type="button"></button></div>
        <button class="top-btn danger" id="resetSide" type="button">Reset all data</button>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="topbar-left">
          <div class="mobile-top">
            <button class="menu-btn" id="hamburger" type="button"><span></span></button>
            <div class="switch"><span>Theme</span><button class="theme" id="themeTop" type="button"></button></div>
          </div>
          <h2 id="pageTitle">Dashboard</h2>
          <p id="pageSubtitle">Your complete money overview.</p>
        </div>
        <div class="top-right">
          <button class="top-btn hidden" id="backBtn" type="button">Back to home</button>
          <div class="switch"><span>Theme</span><button class="theme" id="themeDesktop" type="button"></button></div>
        </div>
      </div>

      <div id="appView"></div>
    </main>
  </div>

  <div id="toast" style="position:fixed;right:16px;bottom:16px;z-index:200;max-width:320px;padding:14px 16px;border-radius:16px;background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--border);box-shadow:var(--shadow);font-weight:800;opacity:0;transform:translateY(8px);pointer-events:none;transition:.18s ease"></div>

  <script>
    const STORAGE_KEY = 'financeTrackerStableV19';
    const DEFAULT_NAV_ITEMS = [
      {key:'dashboard', label:'Dashboard', visible:true},
      {key:'bankBalances', label:'Bank Balance', visible:true},
      {key:'savings', label:'Savings', visible:true},
      {key:'clients', label:'Clients', visible:true},
      {key:'jobApplications', label:'Job Applications', visible:true},
      {key:'bills', label:'Bills', visible:true},
      {key:'subscriptions', label:'Subscriptions', visible:true},
      {key:'categories', label:'Categories', visible:true},
      {key:'transactions', label:'Transactions', visible:true},
      {key:'menuSettings', label:'Menu Settings', visible:true}
    ];

    function makeId(){ return Math.random().toString(36).slice(2,10) + Date.now().toString(36).slice(-4); }
    function clone(v){ return JSON.parse(JSON.stringify(v)); }

    const DEFAULT_STATE = {
      theme:'dark',
      currentView:'dashboard',
      selectedCategoryId:null,
      expandedClientId:null,
      navItems: clone(DEFAULT_NAV_ITEMS),
      categories:[{id:makeId(),name:'Groceries'},{id:makeId(),name:'Transport'},{id:makeId(),name:'Business'}],
      bankAccounts:[],
      savings:[],
      clients:[],
      jobApplications:[],
      bills:[],
      subscriptions:[],
      transactions:[]
    };

    function normalizeNavItems(saved){
      const map = new Map(Array.isArray(saved) ? saved.map(item => [item.key, item]) : []);
      return DEFAULT_NAV_ITEMS.map(item => ({
        key:item.key,
        label: map.get(item.key)?.label?.trim() || item.label,
        visible: map.get(item.key) ? map.get(item.key).visible !== false : item.visible
      }));
    }

    function loadState(){
      const raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return clone(DEFAULT_STATE);
      try{
        const p = JSON.parse(raw);
        return {
          theme:p.theme || 'dark',
          currentView:p.currentView || 'dashboard',
          selectedCategoryId:p.selectedCategoryId || null,
          expandedClientId:p.expandedClientId || null,
          navItems: normalizeNavItems(p.navItems),
          categories:Array.isArray(p.categories) && p.categories.length ? p.categories : clone(DEFAULT_STATE.categories),
          bankAccounts:Array.isArray(p.bankAccounts) ? p.bankAccounts : [],
          savings:Array.isArray(p.savings) ? p.savings : [],
          clients:Array.isArray(p.clients) ? p.clients.map(c => ({...c, schedules:Array.isArray(c.schedules) ? c.schedules : []})) : [],
          jobApplications:Array.isArray(p.jobApplications || p.applications) ? (p.jobApplications || p.applications).map(a => ({...a, link:a.link || '', platform:a.platform || ''})) : [],
          bills:Array.isArray(p.bills) ? p.bills : [],
          subscriptions:Array.isArray(p.subscriptions) ? p.subscriptions : [],
          transactions:Array.isArray(p.transactions) ? p.transactions : []
        };
      }catch(e){
        return clone(DEFAULT_STATE);
      }
    }

    let state = loadState();
    let toastTimer = null;
    const $ = id => document.getElementById(id);

    function saveState(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
    function applyTheme(){ document.body.classList.toggle('light', state.theme === 'light'); }
    function toggleTheme(){ state.theme = state.theme === 'dark' ? 'light' : 'dark'; saveState(); renderApp(); }
    function escapeHtml(v){ return String(v || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;'); }
    function toNumberInput(v){ if(typeof v === 'number') return v; const n = Number(String(v || '').replace(/,/g,'').replace(/[^\d.-]/g,'')); return Number.isNaN(n) ? NaN : n; }
    function formatMoney(v){ if(v === '' || v === null || v === undefined) return 'Not set'; const n = Number(v); if(Number.isNaN(n)) return String(v); return new Intl.NumberFormat('en-PH',{style:'currency',currency:'PHP',maximumFractionDigits:2}).format(n); }
    function formatCurrency(v,c){ if(v === '' || v === null || v === undefined) return 'Not set'; const n = Number(v); if(Number.isNaN(n)) return String(v); const code = c === 'USD' ? 'USD' : 'PHP'; return new Intl.NumberFormat(code === 'USD' ? 'en-US' : 'en-PH',{style:'currency',currency:code,maximumFractionDigits:2}).format(n); }
    function formatDate(s){ if(!s) return 'No date'; const d = new Date(s + (s.length === 10 ? 'T12:00:00' : '')); if(Number.isNaN(d.getTime())) return s; return d.toLocaleDateString('en-PH',{year:'numeric',month:'short',day:'numeric'}); }
    function getMonthLabelFromDate(s){ const d = new Date(s + 'T12:00:00'); if(Number.isNaN(d.getTime())) return 'Unknown month'; return d.toLocaleDateString('en-PH',{year:'numeric',month:'short'}); }
    function getSavingsMonthLabel(m){ if(!m) return 'No month'; const [y,mm] = m.split('-'); const d = new Date(Number(y), Number(mm)-1, 1); if(Number.isNaN(d.getTime())) return m; return d.toLocaleDateString('en-PH',{year:'numeric',month:'long'}); }
    function getCategoryName(id){ const found = state.categories.find(cat => cat.id === id); return found ? found.name : 'Uncategorized'; }
    function getApplicationStatusClass(status){ const v = String(status || '').toLowerCase(); if(v.includes('hire')) return 'green'; if(v.includes('reject')) return 'red'; if(v.includes('follow') || v.includes('phase')) return 'yellow'; return 'blue'; }
    function getBankIcon(name){ const v = String(name || '').toLowerCase(); if(v.includes('gcash')) return '₲'; if(v.includes('maya')) return 'M'; if(v.includes('bpi')) return 'B'; if(v.includes('union')) return 'U'; if(v.includes('bdo')) return 'D'; if(v.includes('metro')) return '₱'; if(v.includes('paypal')) return 'P'; return String(name || '?').trim().charAt(0).toUpperCase() || '?'; }
    function todayDateString(){ const n = new Date(); return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`; }
    function diffInDays(dateString){ if(!dateString) return null; const target = new Date(dateString + 'T12:00:00'); const today = new Date(todayDateString() + 'T12:00:00'); if(Number.isNaN(target.getTime())) return null; return Math.round((target - today) / 86400000); }
    function showToast(message){ const t = $('toast'); t.textContent = message; t.style.opacity = '1'; t.style.transform = 'translateY(0)'; clearTimeout(toastTimer); toastTimer = setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateY(8px)'; }, 1800); }

    function createTransaction(data){

    function getSummary(){
      const income = state.transactions.filter(t => t.type === 'income').reduce((s,t) => s + Number(t.amount), 0);
      const expense = state.transactions.filter(t => t.type === 'expense').reduce((s,t) => s + Number(t.amount), 0);
      const txBal = income - expense;
      const bankTotal = state.bankAccounts.reduce((s,a) => s + Number(a.amount || 0), 0);
      const debtBills = state.bills.filter(b => !b.paid).reduce((s,b) => s + Number(b.amount), 0);
      const debtSubs = state.subscriptions.filter(s => !s.paid).reduce((s,x) => s + Number(x.amount), 0);
      const savingsTotal = state.savings.reduce((s,x) => s + Number(x.currentAmount || 0), 0);
      const savedThisMonthTotal = state.savings.reduce((s,x) => s + Number(x.savedThisMonth || 0), 0);
      return {
        bankTotal,
        transactionIncome:income,
        transactionExpenses:expense,
        transactionBalance:txBal,
        balance:bankTotal + txBal,
        debt:debtBills + debtSubs,
        extraMoney:(bankTotal + txBal) - (debtBills + debtSubs),
        savingsTotal,
        savedThisMonthTotal
      };
    }

    function getWellnessData(){
      const summary = getSummary();
      const spendingRatio = summary.transactionIncome > 0 ? summary.transactionExpenses / summary.transactionIncome : (summary.transactionExpenses > 0 ? 1 : 0);
      const spendingScore = Math.max(0, Math.min(100, Math.round((1 - spendingRatio) * 100)));
      const savingsCoverage = summary.balance > 0 ? (summary.savingsTotal / summary.balance) * 100 : 0;
      const savingsScore = Math.max(0, Math.min(100, Math.round(savingsCoverage)));
      const debtPressure = summary.balance > 0 ? (summary.debt / summary.balance) * 100 : (summary.debt > 0 ? 100 : 0);
      const stabilityScore = Math.max(0, Math.min(100, Math.round(100 - debtPressure)));
      const overallScore = Math.max(0, Math.min(100, Math.round((savingsScore * .30) + (spendingScore * .35) + (stabilityScore * .35))));
      let overall = 'Healthy';
      if(overallScore < 40 || summary.extraMoney < 0) overall = 'Critical';
      else if(overallScore < 70) overall = 'Watch';

      const suggestions = [];
      if(summary.transactionExpenses > summary.transactionIncome && summary.transactionIncome > 0) suggestions.push({title:'Spending is outpacing income',copy:'Your posted expenses are higher than your posted income. Cut the heaviest flexible category first and give yourself a weekly cap.'});
      if(summary.debt > 0 && summary.balance > 0) suggestions.push({title:'Debt is reducing your free cash',copy:`You still have ${formatMoney(summary.debt)} in unpaid bills or subscriptions. Clear the nearest due items first so your extra money improves faster.`});
      if(summary.savingsTotal < summary.balance * .2 && summary.balance > 0) suggestions.push({title:'Savings protection is still thin',copy:'Your protected savings is below 20% of your current balance. Move a fixed amount into savings right after income lands.'});
      if(summary.savedThisMonthTotal <= 0) suggestions.push({title:'No savings movement this month yet',copy:'Add even a small monthly savings amount to build momentum. Consistency matters more than waiting for a big extra amount.'});
      if(!suggestions.length) suggestions.push({title:'Your money flow looks stable',copy:'You are in a good spot. Keep the current structure, review due dates weekly, and increase savings gradually without hurting cash flow.'});

      const expenseBuckets = state.categories.map(cat => ({name:cat.name, amount:state.transactions.filter(t => t.type === 'expense' && t.categoryId === cat.id).reduce((s,t) => s + Number(t.amount),0)})).filter(x => x.amount > 0).sort((a,b) => b.amount-a.amount).slice(0,4);
      return {
        summary, spendingScore, savingsScore, stabilityScore, overallScore, overall, suggestions, expenseBuckets,
        avgIncome: summary.transactionIncome / Math.max(state.transactions.filter(t => t.type === 'income').length,1),
        avgExpense: summary.transactionExpenses / Math.max(state.transactions.filter(t => t.type === 'expense').length,1),
        savingsGap: Math.max(0, 30 - savingsScore)
      };
    }

    function getReminders(){
      const items = [];
      state.bills.forEach(b => { if(b.paid || !b.dueDate) return; const days = diffInDays(b.dueDate); if(days !== null && days <= 5) items.push({id:b.id, type:'bill', label:b.name, amount:b.amount, date:b.dueDate, status:days < 0 ? 'overdue' : 'upcoming', days}); });
      state.clients.forEach(client => (client.schedules || []).forEach(s => { if(s.status === 'paid' || !s.dueDate) return; const days = diffInDays(s.dueDate); if(days !== null && days <= 5) items.push({id:s.id, type:'client', label:`${client.name} payment`, amount:s.expectedAmount, date:s.dueDate, status:s.status === 'delayed' || days < 0 ? 'overdue' : 'upcoming', days, currency:client.currency}); }));
      state.subscriptions.forEach(sub => { const m = String(sub.renewal || '').match(/\d{4}-\d{2}-\d{2}/); if(sub.paid || !m) return; const due = m[0]; const days = diffInDays(due); if(days !== null && days <= 5) items.push({id:sub.id, type:'subscription', label:sub.name, amount:sub.amount, date:due, status:days < 0 ? 'overdue' : 'upcoming', days}); });
      return items.sort((a,b) => new Date(a.date) - new Date(b.date)).slice(0,8);
    }

    function daysInMonth(y,m){ return new Date(y,m+1,0).getDate(); }
    function buildClientSchedules(nextPaymentDate, expectedAmount){
      const anchor = new Date(nextPaymentDate + 'T12:00:00'); if(Number.isNaN(anchor.getTime())) return [];
      const year = anchor.getFullYear(); const day = anchor.getDate(); const startMonth = anchor.getMonth(); const schedules = [];
      for(let month = startMonth; month <= 11; month++){
        const safeDay = Math.min(day, daysInMonth(year,month));
        const due = new Date(year, month, safeDay, 12, 0, 0); const dueDate = due.toISOString().slice(0,10);
        schedules.push({id:makeId(), dueDate, yearMonth:dueDate.slice(0,7), expectedAmount:Number(expectedAmount), status:'pending', transactionId:null});
      }
      return schedules;
    }
    function handleClientRateTypeChange(){ const select = $('clientRateType'); const hoursField = $('clientHoursField'); if(!select || !hoursField) return; if(select.value === 'hourly') hoursField.classList.remove('hidden'); else { hoursField.classList.add('hidden'); const h = $('clientExpectedHours'); if(h) h.value = ''; } }
    function addClient(e){
      e.preventDefault();
      const name = $('clientName').value.trim();
      const rateType = $('clientRateType').value;
      const currency = $('clientCurrency').value;
      const rateAmount = toNumberInput($('clientRateAmount').value);
      const nextPaymentDate = $('clientNextPaymentDate').value;
      const expectedHours = toNumberInput(($('clientExpectedHours') || {}).value);
      if(!name) return alert('Please enter a client name.');
      if(Number.isNaN(rateAmount) || rateAmount <= 0) return alert('Please enter a valid rate amount.');
      if(!nextPaymentDate) return alert('Please enter the next expected payment date.');
      const date = new Date(nextPaymentDate + 'T12:00:00'); if(Number.isNaN(date.getTime())) return alert('Please enter a valid payment date.');
      let expectedMonthlyAmount = rateAmount; let storedHours = null;
      if(rateType === 'hourly'){ if(Number.isNaN(expectedHours) || expectedHours <= 0) return alert('Please enter expected monthly hours for hourly clients.'); storedHours = expectedHours; expectedMonthlyAmount = rateAmount * expectedHours; }
      const schedules = buildClientSchedules(nextPaymentDate, expectedMonthlyAmount); if(!schedules.length) return alert('Could not generate payment schedules.');
      const id = makeId();
      state.clients.push({id, name, rateType, currency, rateAmount, expectedHours:storedHours, expectedMonthlyAmount, nextPaymentDate, paymentDay:date.getDate(), schedules});
      state.expandedClientId = id; saveState(); renderApp(); showToast('Client added.');
    }
    function getClientById(id){ return state.clients.find(c => c.id === id); }

    function setClientScheduleStatus(clientId, scheduleId, nextStatus){
      const client = getClientById(clientId); const schedule = getClientScheduleById(client, scheduleId); if(!client || !schedule) return alert('Could not find this client payment row.');

      schedule.status = nextStatus; saveState(); renderApp(); showToast('Client payment status updated.');
    }

    function renderDashboardView(){
      const summary = getSummary();
      const wellness = getWellnessData();
      const reminders = getReminders();
      const ring = wellness.overallScore;
      const circumference = 2 * Math.PI * 68;
      const dashOffset = circumference - (ring / 100) * circumference;
      const recentTransactions = clone(state.transactions).sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt)).slice(0,5);

      const remindersHtml = reminders.length ? reminders.map(item => `
        <div class="reminder ${item.status==='overdue'?'overdue':''}">
          <div class="reminder-badge ${item.status}">${item.status==='overdue'?'!':'⏰'}</div>
          <div>
            <div class="reminder-title">${escapeHtml(item.label)}</div>
            <div class="reminder-sub">${item.type==='client'?formatCurrency(item.amount,item.currency||'PHP'):formatMoney(item.amount)} • ${formatDate(item.date)} • ${item.days<0?`${Math.abs(item.days)} day(s) late`:item.days===0?'due today':`${item.days} day(s) left`}</div>
          </div>
          <div class="pill ${item.status==='overdue'?'red':'blue'}">${item.status==='overdue'?'Overdue':'Upcoming'}</div>
        </div>
      `).join('') : `<div class="empty">Nothing urgent right now. Your upcoming payments and bills will show here automatically.</div>`;

      const suggestionsHtml = wellness.suggestions.map(s => `<div class="item"><div class="item-title">${escapeHtml(s.title)}</div><div class="meta" style="margin-top:6px">${escapeHtml(s.copy)}</div></div>`).join('');

      const recentHtml = recentTransactions.length ? recentTransactions.map(txn => `
        <div class="ledger-row">
          <div>
            <div style="font-weight:900;font-size:14px;">${escapeHtml(txn.title)}</div>
            <div class="meta"><span>${escapeHtml(txn.sourceType)}</span><span>${formatDate(txn.createdAt.slice(0,10))}</span><span>${escapeHtml(getCategoryName(txn.categoryId))}</span></div>
          </div>
          <div class="amount ${txn.type}">${txn.type==='income'?'+':'-'} ${formatMoney(txn.amount)}</div>
        </div>
      `).join('') : `<div class="empty">No transactions yet. Start with a client payment, bill, subscription, or manual transaction.</div>`;

          return `

              <div><h4>${escapeHtml(getMonthLabelFromDate(schedule.dueDate))}</h4><div class="small">${formatCurrency(schedule.expectedAmount, client.currency)}</div><div class="small">${formatDate(schedule.dueDate)}</div></div>

      `).join('') : `<div class="empty">No subscriptions yet.</div>`;
      return `
        <div class="card"><div class="section"><div><h3>Add Subscription</h3><p>Track anything you subscribe to and post it only when paid.</p></div></div><form class="form" onsubmit="addSubscription(event)"><div class="field"><label>Name</label><input id="subscriptionName" placeholder="ChatGPT" /></div><div class="field"><label>Amount</label><input id="subscriptionAmount" type="number" min="0" step="0.01" placeholder="1200" /></div><div class="field"><label>Renewal</label><input id="subscriptionRenewal" placeholder="Monthly or 2026-03-12" /></div><div class="field"><label>Category</label><select id="subscriptionCategory">${categoryOptionsHtml()}</select></div><div class="field" style="grid-column:1/-1"><button class="top-btn primary" type="submit">Add subscription</button></div></form></div>
        <div class="card"><div class="section"><div><h3>Subscriptions</h3><p>Trash deletes. Status posts or reverses payment.</p></div></div><div class="list">${listHtml}</div></div>
      `;
    }

    function renderCategoriesView(){
      const cardsHtml = state.categories.length ? state.categories.map(category => {
        const items = state.transactions.filter(t => t.categoryId === category.id);
        const income = items.filter(t => t.type === 'income').reduce((s,t) => s + Number(t.amount), 0);
        const expense = items.filter(t => t.type === 'expense').reduce((s,t) => s + Number(t.amount), 0);
        const net = income - expense;
        return `<div class="item"><div class="item-head"><div><div class="item-title">${escapeHtml(category.name)}</div><div class="meta"><span>${items.length} transactions</span><span>Income: ${formatMoney(income)}</span><span>Expense: ${formatMoney(expense)}</span></div></div><div class="toolbar" style="margin-top:0"><span class="pill">${formatMoney(net)}</span><button class="icon-btn" type="button" onclick="deleteCategory('${category.id}')">🗑</button></div></div><div class="toolbar"><button class="top-btn" type="button" onclick="setView('categoryDetail','${category.id}')">Open category</button></div></div>`;
      }).join('') : `<div class="empty">No custom categories yet.</div>`;
      return `
        <div class="card"><div class="section"><div><h3>Create Category</h3><p>Build your own system. Wants, software, savings, business, anything.</p></div></div><form class="form" onsubmit="addCategory(event)"><div class="field"><label>Category Name</label><input id="newCategoryName" placeholder="Example: Wants" /></div><div class="field"><label>&nbsp;</label><button class="top-btn primary" type="submit">Add category</button></div></form></div>
        <div class="card"><div class="section"><div><h3>Your Categories</h3><p>Delete or open each category dashboard.</p></div></div><div class="list">${cardsHtml}</div></div>
      `;
    }

    function renderTransactionsView(){
      const sorted = clone(state.transactions).sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
      const listHtml = sorted.length ? sorted.map(txn => `<div class="item"><div class="item-head"><div><div class="item-title">${escapeHtml(txn.title)}</div><div class="meta"><span>Source: ${escapeHtml(txn.sourceType)}</span><span>Category: ${escapeHtml(getCategoryName(txn.categoryId))}</span><span>${formatDate(txn.createdAt.slice(0,10))}</span></div></div><div class="toolbar" style="margin-top:0"><span class="pill ${txn.type==='income'?'green':'red'}">${txn.type==='income'?'+':'-'} ${formatMoney(txn.amount)}</span>${txn.sourceType==='manual'?`<button class="icon-btn" type="button" onclick="deleteTransaction('${txn.id}')">🗑</button>`:''}</div></div></div>`).join('') : `<div class="empty">No transactions yet.</div>`;
      return `
        <div class="card"><div class="section"><div><h3>Add Manual Transaction</h3><p>Use this for anything outside clients, bills, subscriptions, and scheduled client payments.</p></div></div><form class="form" onsubmit="addManualTransaction(event)"><div class="field"><label>Title</label><input id="manualTitle" placeholder="Groceries run" /></div><div class="field"><label>Amount</label><input id="manualAmount" type="number" min="0" step="0.01" placeholder="500" /></div><div class="field"><label>Type</label><select id="manualType"><option value="expense">Expense</option><option value="income">Income</option></select></div><div class="field"><label>Category</label><select id="manualCategory">${categoryOptionsHtml()}</select></div><div class="field" style="grid-column:1/-1"><button class="top-btn primary" type="submit">Add transaction</button></div></form></div>
        <div class="card"><div class="section"><div><h3>Full Transaction History</h3><p>Manual entries can be deleted with the trash icon.</p></div></div><div class="list">${listHtml}</div></div>
      `;
    }

    function renderBalanceDetailView(){
      const summary = getSummary();
      return `<div class="stats"><div class="card"><div class="label">Main Balance</div><div class="value">${formatMoney(summary.balance)}</div><div class="sub">Bank total plus posted transaction balance</div></div><div class="card"><div class="label">Bank Total</div><div class="value">${formatMoney(summary.bankTotal)}</div><div class="sub">${state.bankAccounts.length} bank account(s)</div></div><div class="card"><div class="label">Savings Total</div><div class="value">${formatMoney(summary.savingsTotal)}</div><div class="sub">Allocated savings inside your total money</div></div><div class="card"><div class="label">Posted Income</div><div class="value">${formatMoney(summary.transactionIncome)}</div><div class="sub">${state.transactions.filter(t=>t.type==='income').length} income entries</div></div><div class="card"><div class="label">Posted Expenses</div><div class="value">${formatMoney(summary.transactionExpenses)}</div><div class="sub">${state.transactions.filter(t=>t.type==='expense').length} expense entries</div></div></div><div class="card"><div class="section"><div><h3>How main balance works</h3><p>This is your source view.</p></div></div><div class="list"><div class="item"><div class="item-title">Bank balances</div><div class="meta">Every bank amount you enter adds directly to your main balance.</div></div><div class="item"><div class="item-title">Savings</div><div class="meta">Savings is already inside your balance, so it is shown separately and not added again.</div></div><div class="item"><div class="item-title">Posted transaction balance</div><div class="meta">Client payments marked paid add to it. Bills and subscriptions marked paid subtract from it.</div></div><div class="item"><div class="item-title">Formula</div><div class="meta">Main Balance = Bank Total + Posted Transaction Balance</div></div></div></div>`;
    }
    function renderDebtDetailView(){ const unpaidBills = state.bills.filter(b => !b.paid); const unpaidSubs = state.subscriptions.filter(s => !s.paid); let itemsHtml = ''; unpaidBills.forEach(b => { itemsHtml += `<div class="item"><div class="item-head"><div><div class="item-title">${escapeHtml(b.name)}</div><div class="meta"><span>Bill</span><span>Due: ${formatDate(b.dueDate)}</span><span>${escapeHtml(getCategoryName(b.categoryId))}</span></div></div><div class="pill red">${formatMoney(b.amount)}</div></div></div>`; }); unpaidSubs.forEach(s => { itemsHtml += `<div class="item"><div class="item-head"><div><div class="item-title">${escapeHtml(s.name)}</div><div class="meta"><span>Subscription</span><span>Renewal: ${escapeHtml(s.renewal || 'Not set')}</span><span>${escapeHtml(getCategoryName(s.categoryId))}</span></div></div><div class="pill red">${formatMoney(s.amount)}</div></div></div>`; }); if(!itemsHtml) itemsHtml = `<div class="empty">No unpaid bills or subscriptions.</div>`; return `<div class="card"><div class="section"><div><h3>Debt Dashboard</h3><p>Debt here means unpaid bills and subscriptions.</p></div></div><div class="mini-grid" style="margin-top:0"><div class="chip"><div class="label">Unpaid Bills</div><div class="value">${formatMoney(unpaidBills.reduce((s,x)=>s+Number(x.amount),0))}</div></div><div class="chip"><div class="label">Unpaid Subscriptions</div><div class="value">${formatMoney(unpaidSubs.reduce((s,x)=>s+Number(x.amount),0))}</div></div></div></div><div class="card"><div class="section"><div><h3>Open Debt Items</h3><p>Mark them paid in their own section to reduce debt.</p></div></div><div class="list">${itemsHtml}</div></div>`; }
    function renderExtraDetailView(){ const summary = getSummary(); return `<div class="stats"><div class="card"><div class="label">Main Balance</div><div class="value">${formatMoney(summary.balance)}</div><div class="sub">Bank total plus posted transaction balance</div></div><div class="card"><div class="label">Debt</div><div class="value">${formatMoney(summary.debt)}</div><div class="sub">Still unpaid</div></div><div class="card"><div class="label">Savings Total</div><div class="value">${formatMoney(summary.savingsTotal)}</div><div class="sub">Protected allocation</div></div><div class="card"><div class="label">Extra Money</div><div class="value">${formatMoney(summary.extraMoney)}</div><div class="sub">Balance minus unpaid debt</div></div></div><div class="card"><div class="section"><div><h3>How extra money works</h3><p>This is automatic.</p></div></div><div class="list"><div class="item"><div class="item-title">Formula</div><div class="meta">Extra Money = Main Balance - Debt</div></div><div class="item"><div class="item-title">Savings note</div><div class="meta">Savings is shown separately so you can still see your allocated money clearly without double counting your total funds.</div></div></div></div>`; }
    function renderCategoryDetailView(){ const category = state.categories.find(c => c.id === state.selectedCategoryId); if(!category) return `<div class="card"><div class="empty">Category not found.</div></div>`; const txns = state.transactions.filter(t => t.categoryId === category.id).sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt)); const income = txns.filter(t => t.type === 'income').reduce((s,t) => s + Number(t.amount),0); const expense = txns.filter(t => t.type === 'expense').reduce((s,t) => s + Number(t.amount),0); const net = income - expense; const listHtml = txns.length ? txns.map(txn => `<div class="item"><div class="item-head"><div><div class="item-title">${escapeHtml(txn.title)}</div><div class="meta"><span>${escapeHtml(txn.sourceType)}</span><span>${formatDate(txn.createdAt.slice(0,10))}</span></div></div><div class="pill ${txn.type==='income'?'green':'red'}">${txn.type==='income'?'+':'-'} ${formatMoney(txn.amount)}</div></div></div>`).join('') : `<div class="empty">No transactions yet in this category.</div>`; return `<div class="stats"><div class="card"><div class="label">Category</div><div class="value">${escapeHtml(category.name)}</div><div class="sub">Custom dashboard</div></div><div class="card"><div class="label">Income</div><div class="value">${formatMoney(income)}</div><div class="sub">Income inside this category</div></div><div class="card"><div class="label">Expense</div><div class="value">${formatMoney(expense)}</div><div class="sub">Expense inside this category</div></div><div class="card"><div class="label">Net</div><div class="value">${formatMoney(net)}</div><div class="sub">${txns.length} transactions</div></div></div><div class="card"><div class="section"><div><h3>${escapeHtml(category.name)} Transactions</h3><p>This dashboard only shows this category.</p></div></div><div class="list">${listHtml}</div></div>`; }
    function renderMenuSettingsView(){ const itemsHtml = state.navItems.map((item,index) => `<div class="item"><div class="item-head"><div style="width:100%"><div class="item-title">${escapeHtml(item.key)}</div><div class="meta"><span>${item.visible?'Visible':'Hidden'}</span><span>Order: ${index+1}</span></div></div></div><div class="form" style="grid-template-columns:1fr;margin-top:12px"><div class="field"><label>Menu Label</label><input type="text" value="${escapeHtml(item.label)}" onchange="updateNavLabel('${item.key}', this.value)" onblur="updateNavLabel('${item.key}', this.value)" /></div></div><div class="toolbar"><button class="top-btn" type="button" onclick="moveNavItem('${item.key}','up')">Move up</button><button class="top-btn" type="button" onclick="moveNavItem('${item.key}','down')">Move down</button><button class="toggle-btn ${item.visible?'paid':'unpaid'}" type="button" onclick="toggleNavVisibility('${item.key}')">${item.visible?'Hide':'Show'}</button></div></div>`).join(''); return `<div class="card"><div class="section"><div><h3>Customize Main Menu</h3><p>Rename menu items, hide what you do not need, and reorder the sidebar.</p></div><button class="top-btn danger" type="button" onclick="resetMenuSettings()">Reset menu</button></div></div><div class="card"><div class="section"><div><h3>Menu Items</h3><p>Your sidebar and mobile menu update instantly and stay saved after reload.</p></div></div><div class="menu-list">${itemsHtml}</div></div>`; }

    function renderView(){ switch(state.currentView){ case 'bankBalances': return renderBankBalancesView(); case 'savings': return renderSavingsView(); case 'clients': return renderClientsView(); case 'jobApplications': return renderJobApplicationsView(); case 'bills': return renderBillsView(); case 'subscriptions': return renderSubscriptionsView(); case 'categories': return renderCategoriesView(); case 'transactions': return renderTransactionsView(); case 'balanceDetail': return renderBalanceDetailView(); case 'debtDetail': return renderDebtDetailView(); case 'extraDetail': return renderExtraDetailView(); case 'categoryDetail': return renderCategoryDetailView(); case 'menuSettings': return renderMenuSettingsView(); default: return renderDashboardView(); } }

    function renderApp(){
      applyTheme(); renderNav();
      const meta = getPageMeta(); $('pageTitle').textContent = meta.title; $('pageSubtitle').textContent = meta.subtitle; $('backBtn').classList.toggle('hidden', !meta.back);
      $('appView').innerHTML = renderView();
      if(state.currentView === 'jobApplications') handleJobApplicationStatusSelectChange();
      if(state.currentView === 'clients') handleClientRateTypeChange();
    }

    $('themeSide').addEventListener('click', toggleTheme); $('themeTop').addEventListener('click', toggleTheme); $('themeDesktop').addEventListener('click', toggleTheme); $('themeMobile').addEventListener('click', toggleTheme);
    $('backBtn').addEventListener('click', goHome); $('resetSide').addEventListener('click', resetAllData); $('resetMobile').addEventListener('click', resetAllData); $('hamburger').addEventListener('click', openMobileMenu);

    Object.assign(window, { setView, closeMobileMenu, saveBankAmount, deleteBankAccount, addSavings, saveSavings, deleteSavings, handleClientRateTypeChange, setClientScheduleStatus, deleteClient, handleJobApplicationStatusSelectChange, saveJobApplication, deleteJobApplication, toggleBillPaid, deleteBill, toggleSubscriptionPaid, deleteSubscription, deleteCategory, deleteTransaction, addBankAccount, addClient, addJobApplication, addBill, addSubscription, addCategory, addManualTransaction, updateNavLabel, toggleNavVisibility, moveNavItem, resetMenuSettings, toggleClientPanel });

    renderApp();
  </script>
</body>
</html>
