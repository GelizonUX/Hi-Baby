<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hi baby 💋</title>
<style>
body {
  margin: 0;
  background: #fff0f5;
  height: 100vh;
  overflow: hidden;
  font-family: Georgia, serif;
}

#box {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  width: 90%;
}

h1 {
  font-size: 72px;
  color: #ff4da6;
  margin: 0;
  line-height: 1.15;
}

p {
  color: #ff85c1;
  font-style: italic;
  font-size: 18px;
  margin-top: 10px;
}

button {
  margin-top: 30px;
  padding: 18px 40px;
  font-size: 22px;
  background: #ff4da6;
  color: white;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  font-family: Georgia, serif;
  display: block;
  margin-left: auto;
  margin-right: auto;
  transition: transform 0.15s, background 0.15s;
}

button:hover {
  background: #e6008c;
  transform: scale(1.06);
}

button:active {
  transform: scale(0.93);
}

.emoji {
  position: fixed;
  pointer-events: none;
  z-index: 9999;
}

/* confession screen */
#conf-screen {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(255,240,245,0.97);
  z-index: 999999;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px 30px;
}

#conf-line1 {
  font-size: clamp(22px, 5vw, 42px);
  color: #3a1a2e;
  font-family: Georgia, serif;
  opacity: 0;
  transition: opacity 1.4s ease;
  line-height: 1.4;
}

#conf-line2 {
  font-size: clamp(28px, 7vw, 60px);
  color: #ff4da6;
  margin-top: 24px;
  font-family: Georgia, serif;
  text-shadow: 0 0 40px rgba(255,77,166,0.5);
  opacity: 0;
  transition: opacity 1.4s ease;
  line-height: 1.3;
}

@media (max-width: 600px) {
  h1 { font-size: 42px; }
  button { font-size: 17px; padding: 14px 28px; }
}
</style>
</head>
<body>

<div id="box">
  <h1>Hi baby 💋</h1>
  <p>i made this just for you ✨</p>
  <button id="btn">Click here to kiss me 💋</button>
</div>

<!-- confession screen (hidden until click 9) -->
<div id="conf-screen">
  <div id="conf-line1"></div>
  <div id="conf-line2"></div>
</div>

<script>

// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
var clickCount = 0;
var done = false;

var kissEmojis  = ["💋","💋","💋","💕","💗","💖","❤️","😘","🌹","💋"];
var bgEmojis    = ["💋","❤️","💕","💗","💖","😘","💝","💓","💋","❤️"];
var sweetWords  = [
  "mwah! 💋",
  "you're so cute 🥰",
  "i miss you 💕",
  "you make me smile 😊",
  "kisses for you 💋",
  "you're my favorite 💖",
  "thinking of you 💭",
  "you're everything 🥺",
  "stay forever? 💋",
  "you smell nice 😘"
];

// ═══════════════════════════════════════════
//  BACKGROUND FLOATING EMOJIS
// ═══════════════════════════════════════════
function makeFloater() {
  var el = document.createElement("div");
  el.className = "emoji";
  el.innerText = bgEmojis[Math.floor(Math.random() * bgEmojis.length)];
  el.style.left    = Math.random() * window.innerWidth + "px";
  el.style.top     = window.innerHeight + 40 + "px";
  el.style.fontSize = (Math.random() * 20 + 15) + "px";
  el.style.opacity = "0.55";
  document.body.appendChild(el);

  var speed = Math.random() * 2 + 1.5;
  var drift = (Math.random() - 0.5) * 1.5;
  var posY  = window.innerHeight + 40;
  var posX  = parseFloat(el.style.left);

  function move() {
    posY -= speed;
    posX += drift;
    el.style.top  = posY + "px";
    el.style.left = posX + "px";
    if (posY < -60) {
      el.remove();
    } else {
      requestAnimationFrame(move);
    }
  }
  requestAnimationFrame(move);
}

// Seed 20 floaters staggered on load
for (var i = 0; i < 20; i++) {
  (function(i){ setTimeout(makeFloater, i * 250); })(i);
}
// Keep spawning forever
setInterval(makeFloater, 420);

// ═══════════════════════════════════════════
//  CURSOR TRAIL
// ═══════════════════════════════════════════
document.addEventListener("mousemove", function(e) {
  if (Math.random() > 0.4) return;
  var el = document.createElement("div");
  el.className  = "emoji";
  el.innerText  = Math.random() > 0.5 ? "💋" : "💕";
  el.style.left = e.clientX + "px";
  el.style.top  = e.clientY + "px";
  el.style.fontSize = (Math.random() * 8 + 10) + "px";
  el.style.opacity  = "0.85";
  el.style.zIndex   = "9998";
  document.body.appendChild(el);

  var posY  = e.clientY;
  var alpha = 0.85;

  function fade() {
    posY  -= 1.3;
    alpha -= 0.04;
    el.style.top     = posY + "px";
    el.style.opacity = alpha;
    if (alpha <= 0) { el.remove(); }
    else { requestAnimationFrame(fade); }
  }
  requestAnimationFrame(fade);
});

// ═══════════════════════════════════════════
//  FIRE ONE KISS EMOJI OUTWARD
// ═══════════════════════════════════════════
function fireKiss(cx, cy) {
  var el = document.createElement("div");
  el.className  = "emoji";
  el.innerText  = kissEmojis[Math.floor(Math.random() * kissEmojis.length)];
  el.style.left = cx + "px";
  el.style.top  = cy + "px";
  el.style.fontSize = (Math.random() * 18 + 22) + "px";
  el.style.opacity  = "1";
  el.style.zIndex   = "99999";
  document.body.appendChild(el);

  var angle = Math.random() * Math.PI * 2;
  var speed = Math.random() * 9 + 4;
  var vx    = Math.cos(angle) * speed;
  var vy    = Math.sin(angle) * speed;
  var posX  = cx;
  var posY  = cy;
  var alpha = 1;

  function move() {
    posX  += vx;
    posY  += vy;
    vy    += 0.18;
    alpha -= 0.02;
    el.style.left    = posX + "px";
    el.style.top     = posY + "px";
    el.style.opacity = alpha;
    if (alpha <= 0) { el.remove(); }
    else { requestAnimationFrame(move); }
  }
  requestAnimationFrame(move);
}

// ═══════════════════════════════════════════
//  SWEET FLOATING MESSAGE
// ═══════════════════════════════════════════
function showWord(cx, cy) {
  var el = document.createElement("div");
  el.className  = "emoji";
  el.innerText  = sweetWords[Math.floor(Math.random() * sweetWords.length)];
  el.style.left = (cx - 80) + "px";
  el.style.top  = (cy - 20) + "px";
  el.style.fontSize   = "18px";
  el.style.color      = "#ff4da6";
  el.style.fontStyle  = "italic";
  el.style.fontFamily = "Georgia, serif";
  el.style.opacity    = "1";
  el.style.zIndex     = "99999";
  el.style.whiteSpace = "nowrap";
  el.style.textShadow = "0 1px 8px rgba(255,77,166,0.4)";
  document.body.appendChild(el);

  var posY  = cy - 20;
  var alpha = 1;

  function move() {
    posY  -= 1.5;
    alpha -= 0.012;
    el.style.top     = posY + "px";
    el.style.opacity = alpha;
    if (alpha <= 0) { el.remove(); }
    else { requestAnimationFrame(move); }
  }
  requestAnimationFrame(move);
}

// ═══════════════════════════════════════════
//  SPECIAL KISS MOMENT
// ═══════════════════════════════════════════
function showSpecialKiss() {
  var wrap = document.createElement("div");
  wrap.className        = "emoji";
  wrap.style.left       = Math.floor(Math.random() * (window.innerWidth  - 180) + 50) + "px";
  wrap.style.top        = Math.floor(Math.random() * (window.innerHeight - 180) + 50) + "px";
  wrap.style.zIndex     = "99998";
  wrap.style.textAlign  = "center";
  wrap.style.opacity    = "0";
  wrap.style.transition = "opacity 0.4s ease, transform 0.4s cubic-bezier(0.34,1.56,0.64,1)";
  wrap.style.transform  = "scale(0.3)";

  var big = document.createElement("div");
  big.innerText       = "💋";
  big.style.fontSize  = "58px";
  big.style.filter    = "drop-shadow(0 0 18px #ff4da6)";

  var lbl = document.createElement("div");
  lbl.innerText           = "this one's just for you";
  lbl.style.fontSize      = "13px";
  lbl.style.color         = "#ff4da6";
  lbl.style.fontStyle     = "italic";
  lbl.style.fontFamily    = "Georgia, serif";
  lbl.style.marginTop     = "5px";
  lbl.style.letterSpacing = "1px";

  wrap.appendChild(big);
  wrap.appendChild(lbl);
  document.body.appendChild(wrap);

  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      wrap.style.opacity   = "1";
      wrap.style.transform = "scale(1)";
    });
  });

  setTimeout(function() {
    wrap.style.opacity   = "0";
    wrap.style.transform = "scale(0.7) translateY(-40px)";
  }, 2500);

  setTimeout(function() { wrap.remove(); }, 3100);
}

// ═══════════════════════════════════════════
//  BUTTON CLICK
// ═══════════════════════════════════════════
document.getElementById("btn").addEventListener("click", function(e) {
  if (done) return;
  clickCount++;

  var cx = e.clientX;
  var cy = e.clientY;

  // 30 kisses explode outward
  for (var i = 0; i < 30; i++) {
    fireKiss(cx, cy);
  }

  // Sweet message floats up
  showWord(cx, cy);

  // 30% chance of special kiss
  if (Math.random() < 0.3) {
    setTimeout(showSpecialKiss, 200);
  }

  // ── PROGRESSION ──
  if (clickCount === 3) {
    document.querySelector("h1").innerText = "these are all for you 💋";
  }
  if (clickCount === 6) {
    document.querySelector("h1").innerText = "you mean so much to me 🥺";
    document.querySelector("p").innerText  = "keep going... 💕";
  }
  if (clickCount === 9 && !done) {
    done = true;
    setTimeout(showConfession, 500);
  }
});

// ═══════════════════════════════════════════
//  CONFESSION SCREEN
// ═══════════════════════════════════════════

  var screen = document.getElementById("conf-screen");
  var line1  = document.getElementById("conf-line1");
  var line2  = document.getElementById("conf-line2");

  line1.innerText = "okay... i just have to say this 🥺";
  line2.innerText = "I'm so proud of you baby, I love you ❤️❤️❤️";

  screen.style.display        = "flex";
  screen.style.opacity        = "0";
  screen.style.transition     = "opacity 1.5s ease";

  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      screen.style.opacity = "1";
    });
  });

  // Line 1 fades in
  setTimeout(function() {
    line1.style.opacity = "1";
  }, 900);

  // Line 2 fades in after
  setTimeout(function() {
    line2.style.opacity = "1";
  }, 2400);

  // Rain of hearts and kisses on confession
  for (var i = 0; i < 60; i++) {
    (function(i) {
      setTimeout(function() {
        var el = document.createElement("div");
        el.className  = "emoji";
        el.innerText  = ["💋","❤️","💕","💗","💖","💝"][Math.floor(Math.random() * 6)];
        el.style.left = Math.random() * window.innerWidth + "px";
        el.style.top  = "-40px";
        el.style.fontSize = (Math.random() * 20 + 18) + "px";
        el.style.opacity  = "0
